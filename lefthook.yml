pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{ts,md,yml,yaml,json,jsonc,toml}"
      run: bunx eslint --fix --cache --cache-location .eslintcache {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  commands:
    test:
      run: bun test test/
