name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: build + publish single-file binaries
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: cross-compile
        run: |
          mkdir -p dist
          for target in bun-linux-x64 bun-linux-arm64 bun-darwin-x64 bun-darwin-arm64 bun-windows-x64; do
            out="dist/modelmux-${target#bun-}"
            [ "$target" = "bun-windows-x64" ] && out="$out.exe"
            echo "building $out"
            bun build --compile --minify --target="$target" src/main.ts --outfile "$out"
          done
          ls -lh dist
      - name: checksums
        run: cd dist && sha256sum modelmux-* > SHA256SUMS && cat SHA256SUMS
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/modelmux-* dist/SHA256SUMS --generate-notes --title "${{ github.ref_name }}"
