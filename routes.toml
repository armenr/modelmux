# Friendly aliases → "<upstream>:<slug>". Swap a model in ONE place.
# Override any alias at runtime with MUX_MODEL_<ALIAS> (e.g. MUX_MODEL_FLAGSHIP).

# Alias used when no route below matches (the orchestrator / main loop).
default = "orchestrator"

# Cutoff for the "longContext" work type (see the routes below). Has NO effect
# until a `workType = "longContext"` route exists — it's a knob for optional
# size-based routing, off by default.
longContextThreshold = 200000

# First match wins. Order = precedence (most specific first).
routes = [
  { when = { tag = "flagship" }, use = "flagship" },
  { when = { tag = "max" }, use = "max" },
  { when = { tag = "reasoner" }, use = "reasoner" },
  { when = { tag = "review" }, use = "review" },
  { when = { tag = "claude-review" }, use = "claude-review" },
  # A tagged control/setup agent stays on Claude (passthrough) even under anySubagent.
  { when = { tag = "control" }, use = "orchestrator" },
  # Work-type rules (optional): match a request's WORK TYPE instead of a tag, so
  # you don't have to tag every agent. Types: background (x-app: cli-bg),
  # longContext (est. tokens > longContextThreshold), think (extended-thinking),
  # webSearch (request carries a web_search tool). Only `background` is wired up
  # by default — uncomment any of these (before the anySubagent catch-all) to
  # enable size-/type-based routing:
  #   { when = { workType = "longContext" }, use = "max" },
  #   { when = { workType = "think" }, use = "reasoner" },
  #   { when = { workType = "webSearch" }, use = "review" },
  { when = { workType = "background" }, use = "cheap" },
  { when = { anySubagent = true }, use = "flagship" },
]

[models]
orchestrator = "anthropic:passthrough" # main chat — keep the model CC picked
flagship = "openrouter:z-ai/glm-5.2"
max = "openrouter:qwen/qwen3.7-max"
reasoner = "openrouter:deepseek/deepseek-v4-pro"
review = "openrouter:minimax/minimax-m3"
cheap = "openrouter:deepseek/deepseek-v4-flash"
claude-review = "anthropic:claude-sonnet-5"

# --- upstreams (optional) ---------------------------------------------------
# "anthropic" (passthrough), "openrouter" (Bearer OPENROUTER_API_KEY), and "zai"
# (Z.ai GLM Coding Plan, Bearer ZAI_API_KEY) are built in. Add your own
# Anthropic-Messages-compatible endpoints here, then use them like any other
# alias: <name>:<slug>. auth = passthrough | passthrough:ENV | bearer:ENV | none.
#
# Z.AI SUBSCRIPTION (flat-rate, not per-token): set ZAI_API_KEY and point an alias
# at the built-in zai upstream (no [upstreams] block needed). Use the BARE slug:
#   flagship = "zai:glm-5.2"    # in [models] above — not "z-ai/glm-5.2"
#
# LOCAL MODELS: recent Ollama (v0.14+) speaks the Anthropic Messages API
# natively, so no translation shim is needed — point an alias at it and run your
# grunt-work subagents on a local model while the orchestrator stays on Claude:
#
#   [upstreams]
#   local = { base = "http://localhost:11434", auth = "none" }
#
#   # then in [models] above:
#   flagship = "local:qwen3-coder:30b"    # subagents run on your local Qwen
#
# (Non-Ollama runners like LM Studio / llama.cpp / vLLM speak the OpenAI format;
# put a LiteLLM proxy in front to expose an Anthropic endpoint, then point the
# upstream base at that.)
